<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSA Admin Dashboard</title>
    <link rel="icon" type="image/png" href="Images/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900">Event Registry</h1>
                <p class="text-slate-500 font-medium">Manage and export all active RSVPs</p>
            </div>
            <div class="flex gap-3">
                <button id="exportCSV" class="bg-white text-slate-700 font-bold px-6 py-2.5 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-all flex items-center gap-2">
                    <span>Export CSV</span>
                </button>
                <button id="clearAll" class="bg-red-50 text-red-600 font-bold px-6 py-2.5 rounded-xl border border-red-100 hover:bg-red-100 transition-all">
                    Clear Data
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-sm font-bold uppercase tracking-wider">Total RSVPs</p>
                <p id="totalCount" class="text-4xl font-black text-green-700 mt-1">--</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Attendee</th>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Hofstra ID</th>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Guests</th>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Submission Date</th>
                        </tr>
                    </thead>
                    <tbody id="rsvpTableBody" class="divide-y divide-slate-50 text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const API_BASE = "https://rsvp-backend-2ycz.onrender.com"; // Server PORT     
    const tableBody = document.getElementById("rsvpTableBody");
    const exportBtn = document.getElementById("exportCSV");
    const clearBtn  = document.getElementById("clearAll");

    async function loadRSVPs() {
        tableBody.innerHTML = "";
        try {
            const r = await fetch(`${API_BASE}/rsvps`);
            const list = await r.json();

            if (!Array.isArray(list) || list.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="border px-4 py-2 text-center italic text-gray-500">No RSVPs yet.</td></tr>`;
                return;
            }

                for (const e of list) {
                    const guests = [];
                    
                if (e.guest1fname || e.guest1lname) {
                    guests.push(`${e.guest1fname || ""} ${e.guest1lname || ""}`.trim());
                }

                if (e.guest2fname || e.guest2lname) {
                    guests.push(`${e.guest2fname || ""} ${e.guest2lname || ""}`.trim());
                }

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="border px-4 py-2">${(e.fname || "")} ${(e.lname || "")}</td>
                    <td class="border px-4 py-2">${e.email || ""}</td>
                    <td class="border px-4 py-2">${e.hofstraId || ""}</td>
                    <td class="border px-4 py-2">${guests.join("<br>")}</td>
                    <td class="border px-4 py-2">${e.submitTime || ""}</td>
                `;
                tableBody.appendChild(tr);
            }
        } 
        catch (err) {
            console.error(err);
            alert("Failed to load RSVPs");
        }
    }
    function exportCSV() {
        window.location.href = `${API_BASE}/export.csv`;
    }

    async function clearEntries() {
        if (!confirm("Delete ALL RSVP entries? This cannot be undone.")) {
            return;
        }
        try {
            await fetch(`${API_BASE}/rsvps`, { method: "DELETE" });
            loadRSVPs();
        } 
        catch (err) {
            console.error(err);
            alert("Failed to clear");
        }
    }
    exportBtn?.addEventListener("click", exportCSV);
    clearBtn?.addEventListener("click", clearEntries);
    window.addEventListener("DOMContentLoaded", loadRSVPs);
</script>
</body>
</html>
