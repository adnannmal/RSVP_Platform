<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSA Admin Dashboard</title>
    <link rel="icon" type="image/png" href="Images/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900">Event Registry</h1>
                <p class="text-slate-500 font-medium">Manage and export all active RSVPs</p>
            </div>
            <div class="flex gap-3">
                <button id="exportCSV" class="bg-white text-slate-700 font-bold px-6 py-2.5 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-all flex items-center gap-2">
                    <span>Export CSV</span>
                </button>
                <button id="clearAll" class="bg-red-50 text-red-600 font-bold px-6 py-2.5 rounded-xl border border-red-100 hover:bg-red-100 transition-all">
                    Clear Data
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-sm font-bold uppercase tracking-wider">Total RSVPs</p>
                <p id="totalCount" class="text-4xl font-black text-green-700 mt-1">--</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Attendee</th>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Hofstra ID</th>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Guests</th>
                            <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Submission Date</th>
                        </tr>
                    </thead>
                    <tbody id="rsvpTableBody" class="divide-y divide-slate-50 text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Keep your original script here, just update the innerHTML to match these classes:
        // tr.innerHTML = `<td class="px-6 py-4 font-bold">${e.fname} ${e.lname}<br><span class="text-xs font-medium text-slate-400">${e.email}</span></td>...`
    </script>
</body>
</html>
