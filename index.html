<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSA RSVP - Coming Soon</title>
    <link rel="icon" type="image/png" href="Images/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-slow { animation: pulse-slow 3s infinite; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6" 
    style="background-image: radial-gradient(circle at 50% 50%, #064e3b 0%, #0f172a 100%);">

    <div class="glass-card rounded-3xl shadow-2xl p-10 max-w-lg w-full text-center transform transition-all">
        <div class="mb-6 flex justify-center">
            <div class="p-4 bg-green-100 rounded-full animate-bounce">
                <span class="text-4xl">⏳</span>
            </div>
        </div>
        
        <h1 id="title" class="text-4xl font-black text-slate-800 mb-2 tracking-tight uppercase"></h1>
        <p class="text-slate-500 font-medium mb-8">Mark your calendars. We're opening soon!</p>
        
        <div id="timer" class="text-5xl font-mono font-bold text-green-700 bg-green-50 py-6 rounded-2xl shadow-inner tracking-widest">
            00:00:00
        </div>

        <div id="countdown" class="mt-8 text-sm font-bold text-slate-400 uppercase tracking-widest animate-pulse-slow">
            Days : Hours : Mins : Secs
        </div>
    </div>

<script>
    const title = document.getElementById("title");
    const timer = document.getElementById("timer");
    const countdown = document.getElementById("countdown");
    const open = new Date();
    localStorage.setItem("formUnlocked", "false");

    open.setFullYear(2025, 6, 16); 
    open.setHours(14); 
    open.setMinutes(52); 
    open.setSeconds(0);

    if (localStorage.getItem("formUnlocked") === "true") {
        window.location.href = "home.html";
    }

    const interval = setInterval(() => {
    const now = new Date();
    const timeLeft = open - now;

    if (timeLeft <= 0) {
        clearInterval(interval);
        timer.innerText = "Redirecting...";
        title.innerText = "Form Opened";
        localStorage.setItem("formUnlocked", "true");
        window.location.href = "home.html";
        return;
    }

    const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
    const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
    const secs = Math.floor((timeLeft % (1000 * 60)) / 1000);

    timer.innerText = `${days}d ${hours}h ${mins}m ${secs}s`;
    title.innerText = "RSVP Opening In";
    }, 1000);
    </script>
</body>
</html>
